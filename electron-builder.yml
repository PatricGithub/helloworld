appId: com.miglena.architect-crm
productName: Architect CRM
directories:
  buildResources: resources
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.*,.prettierrc.*,dev.db}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!drizzle.config.*'
extraResources:
  - from: ./drizzle
    to: drizzle
asarUnpack:
  - '**/node_modules/better-sqlite3/**'
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: '${productName}-Setup-${version}.${ext}'
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
npmRebuild: true
