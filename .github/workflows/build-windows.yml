name: Build Windows .exe

on:
  push:
    branches:
      - main
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Python setuptools (required by node-gyp)
        run: pip install setuptools

      - name: Install dependencies (skip postinstall — electron-builder will rebuild native modules)
        run: npm install --ignore-scripts

      - name: Build app + Windows installer
        run: npm run build:win

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Architect-CRM-Windows
          path: dist/*.exe
          retention-days: 30
